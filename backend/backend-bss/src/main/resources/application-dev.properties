# Local development - connects to Docker postgres on localhost
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:bss-db-schema}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:123456aA@}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JDBC batching — labeling persists hundreds of programs/labels at once; without
# this each save() is a separate round-trip to the remote cloud DB (slow).
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

server.port=8080

jwt.secret=9a437fddbafd3b9c83d757264ba2bcbd1c27ff58223bfedffd513837ce404f35
jwt.expiration-ms=86400000

app.cors.allowed-origins=http://localhost:5173

app.seed.enabled=true





# Python category-prediction microservice (ml-service). The backend calls
# POST {ml.service.url}/predict to lazily label a day's programs on first view.
ml.service.url=http://localhost:5005

