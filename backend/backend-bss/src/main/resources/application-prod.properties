# Production - connects via Docker network service name
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JDBC batching — see application-dev.properties. Critical with the remote cloud DB:
# labeling persists hundreds of rows per request/warm-up in batches, not one-by-one.
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

server.port=8080

jwt.secret=${JWT_SECRET}
# Must be jwt.expiration-ms — JwtService and AuthService inject ${jwt.expiration-ms}.
jwt.expiration-ms=${JWT_EXPIRATION}

# CORS allowed origins (required by SecurityConfig; comma-separated, no default).
# The SPA is served same-origin via Caddy so CORS isn't strictly exercised, but
# this must be set. Override with APP_CORS_ALLOWED_ORIGINS if the domain changes.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://broadcast-scheduler-system.me,https://www.broadcast-scheduler-system.me}

# Python category-prediction microservice (ml-service)
ml.service.url=${ML_SERVICE_URL:http://localhost:5005}

# Reminder notifications (Web Push + Telegram)
app.webpush.public-key=${VAPID_PUBLIC_KEY:}
app.webpush.private-key=${VAPID_PRIVATE_KEY:}
app.webpush.subject=${VAPID_SUBJECT:mailto:admin@bss.local}
app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
app.reminder.zone=${APP_REMINDER_ZONE:Asia/Ho_Chi_Minh}

# tv360 "Watch on tv360" deep links (public schedule API for pid resolution)
app.tv360.api-base=${TV360_API_BASE:https://api.tv360.vn}